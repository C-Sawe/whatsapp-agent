<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosop Farm Inputs - Webhook Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            margin: 2rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }
        
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
        
        .alert.success {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            display: block;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Settings Dashboard</h1>
            <p class="subtitle">Manage your webhook and Google Sheets credentials.</p>
        </div>
        
        {% if success %}
        <div class="alert success">
            Settings have been successfully updated!
        </div>
        {% endif %}

        <form action="/api/credentials" method="POST">
            <div class="form-group">
                <label for="WHATSAPP_TOKEN">WhatsApp System User Token</label>
                <input type="password" id="WHATSAPP_TOKEN" name="WHATSAPP_TOKEN" value="{{ vars.get('WHATSAPP_TOKEN', '') }}" placeholder="EAAI..." required>
            </div>

            <div class="form-group">
                <label for="WHATSAPP_PHONE_NUMBER_ID">Phone Number ID</label>
                <input type="text" id="WHATSAPP_PHONE_NUMBER_ID" name="WHATSAPP_PHONE_NUMBER_ID" value="{{ vars.get('WHATSAPP_PHONE_NUMBER_ID', '') }}" placeholder="1234567890" required>
            </div>

            <div class="form-group">
                <label for="VERIFY_TOKEN">Verify Token</label>
                <input type="text" id="VERIFY_TOKEN" name="VERIFY_TOKEN" value="{{ vars.get('VERIFY_TOKEN', '') }}" placeholder="Your custom secret token" required>
            </div>

            <div class="form-group">
                <label for="SPREADSHEET_ID">Google Spreadsheet ID</label>
                <input type="text" id="SPREADSHEET_ID" name="SPREADSHEET_ID" value="{{ vars.get('SPREADSHEET_ID', '') }}" placeholder="ID from the sheet URL" required>
            </div>

            <div class="form-group">
                <label for="GOOGLE_APPLICATION_CREDENTIALS">Google Credentials Path</label>
                <input type="text" id="GOOGLE_APPLICATION_CREDENTIALS" name="GOOGLE_APPLICATION_CREDENTIALS" value="{{ vars.get('GOOGLE_APPLICATION_CREDENTIALS', 'service_account.json') }}" required>
            </div>

            <button type="submit" class="btn-submit">Save Settings</button>
        </form>
    </div>

</body>
</html>
